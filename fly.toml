# fly.toml app configuration file generated for rootvscode on 2026-02-27T10:36:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rootvscode'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '500gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 2048
